backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
display_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
logo_url: "/logo.png"

collections:
  - name: "settings"
    label: "K9 Studio"
    files:
      - label: "Contenuti principali"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:
          - {label: "Nome sito", name: "siteName", widget: "string"}
          - {label: "Logo", name: "logo", widget: "image", required: false}
          - {label: "Logo secondario", name: "logoSecondary", widget: "image", required: false}
          - {label: "Tagline", name: "tagline", widget: "string", required: false}
          - {label: "Titolo Hero", name: "heroTitle", widget: "string"}
          - {label: "Sottotitolo Hero", name: "heroSubtitle", widget: "markdown", required: false}
          - {label: "Immagine Hero", name: "heroImage", widget: "image", required: false}
          - label: "Banner promozionale"
            name: "banner"
            widget: "object"
            required: false
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: false, required: false}
              - {label: "Testo banner", name: "text", widget: "string", required: false}
              - {label: "Sfondo banner", name: "background", widget: "string", required: false}
              - {label: "Colore testo banner", name: "textColor", widget: "string", required: false}

          - label: "Popup avviso"
            name: "popup"
            widget: "object"
            required: false
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: false, required: false}
              - {label: "Titolo", name: "title", widget: "string", required: false}
              - {label: "Testo", name: "text", widget: "markdown", required: false}

          - label: "Menu navigazione"
            name: "menu"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - {label: "Attiva", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Etichetta", name: "label", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}

          - label: "Slideshow Hero"
            name: "heroImages"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Titolo interno", name: "title", widget: "string", required: false}
              - {label: "Immagine", name: "image", widget: "image", required: false}

          - label: "SEO e anteprima social"
            name: "seo"
            widget: "object"
            required: false
            fields:
              - {label: "Titolo SEO", name: "title", widget: "string", required: false}
              - {label: "Descrizione SEO", name: "description", widget: "text", required: false}
              - {label: "Immagine anteprima social", name: "image", widget: "image", required: false}

          - label: "Ordine sezioni"
            name: "sectionOrder"
            widget: "list"
            required: false
            fields:
              - label: "Sezione"
                name: "section"
                widget: "select"
                options:
                  - {label: "Hero", value: "hero"}
                  - {label: "Profilo", value: "owner"}
                  - {label: "Discipline", value: "disciplines"}
                  - {label: "Cani", value: "dogs"}
                  - {label: "Corsi", value: "courses"}
                  - {label: "Eventi", value: "events"}
                  - {label: "Galleria", value: "gallery"}
                  - {label: "Video", value: "videos"}
                  - {label: "Testimonianze", value: "reviews"}
                  - {label: "Partner", value: "partners"}
                  - {label: "Documenti", value: "documents"}
                  - {label: "FAQ", value: "faq"}
                  - {label: "Contatti", value: "contacts"}

          
          - label: "Visibilità sezioni"
            name: "sectionVisibility"
            widget: "object"
            required: false
            fields:
              - {label: "Mostra Hero", name: "hero", widget: "boolean", default: true, required: false}
              - {label: "Mostra Profilo", name: "owner", widget: "boolean", default: true, required: false}
              - {label: "Mostra Discipline", name: "disciplines", widget: "boolean", default: true, required: false}
              - {label: "Mostra Cani", name: "dogs", widget: "boolean", default: true, required: false}
              - {label: "Mostra Corsi", name: "courses", widget: "boolean", default: true, required: false}
              - {label: "Mostra Eventi", name: "events", widget: "boolean", default: true, required: false}
              - {label: "Mostra Galleria", name: "gallery", widget: "boolean", default: true, required: false}
              - {label: "Mostra Partner", name: "partners", widget: "boolean", default: true, required: false}
              - {label: "Mostra FAQ", name: "faq", widget: "boolean", default: true, required: false}
              - {label: "Mostra Contatti", name: "contacts", widget: "boolean", default: true, required: false}

          - label: "Impostazioni grafiche e pulsanti"
            name: "settings"
            widget: "object"
            required: false
            fields:
              - {label: "Colore arancio principale", name: "themeOrange", widget: "string", required: false}
              - {label: "Colore oro", name: "themeGold", widget: "string", required: false}
              - {label: "Colore testo principale", name: "themeText", widget: "string", required: false}
              - {label: "Colore testo secondario", name: "themeMuted", widget: "string", required: false}
              - {label: "Sfondo generale sito", name: "siteBackground", widget: "string", required: false}
              - {label: "Sfondo schede", name: "cardBackground", widget: "string", required: false}
              - {label: "Sfondo sezioni", name: "sectionBackground", widget: "string", required: false}
              - {label: "Font generale sito", name: "siteFont", widget: "string", required: false}
              - {label: "Font titoli", name: "titleFont", widget: "string", required: false}
              - {label: "Modalità tema", name: "themeMode", widget: "select", required: false, options: ["dark", "light"]}
              - {label: "Colore header", name: "headerBackground", widget: "string", required: false}
              - {label: "Colore footer", name: "footerBackground", widget: "string", required: false}
              - {label: "Sfondo pulsanti principali", name: "buttonBackground", widget: "string", required: false}
              - {label: "Colore testo pulsanti", name: "buttonTextColor", widget: "string", required: false}
              - {label: "Colore bordi", name: "borderColor", widget: "string", required: false}
              - {label: "Raggio angoli schede", name: "cardRadius", widget: "string", required: false}
              - {label: "Ombra schede", name: "cardShadow", widget: "boolean", default: true, required: false}
              - {label: "Altezza Hero", name: "heroHeight", widget: "string", required: false}
              - {label: "Opacità Hero", name: "heroOverlayOpacity", widget: "string", required: false}
              - {label: "Secondi slideshow Hero", name: "heroSlideSeconds", widget: "number", value_type: "int", default: 6, required: false}
              - {label: "Google Analytics ID", name: "googleAnalyticsId", widget: "string", required: false}
              - {label: "Abilita ricerca interna", name: "enableSearch", widget: "boolean", default: true, required: false}
              - {label: "Footer avanzato", name: "advancedFooter", widget: "boolean", default: true, required: false}
              - {label: "Testo pulsante Apri sezione", name: "openSectionText", widget: "string", required: false}
              - {label: "Testo pulsante Chiudi sezione", name: "closeSectionText", widget: "string", required: false}
              - {label: "Testo pulsante Scopri disciplina", name: "discoverDisciplineText", widget: "string", required: false}
              - {label: "Testo pulsante Iscriviti", name: "enrollButtonText", widget: "string", required: false}
              - {label: "Testo pulsante WhatsApp", name: "whatsappButtonText", widget: "string", required: false}
              - {label: "Testo pulsante Programma", name: "programButtonText", widget: "string", required: false}
              - {label: "Testo pulsante contatto WhatsApp", name: "contactWhatsappText", widget: "string", required: false}

          - label: "Titoli sezioni"
            name: "sectionTexts"
            widget: "object"
            required: false
            fields:
              - {label: "Titolo Discipline", name: "disciplinesTitle", widget: "string", required: false}
              - {label: "Sottotitolo Discipline", name: "disciplinesSubtitle", widget: "text", required: false}
              - {label: "Titolo Cani", name: "dogsTitle", widget: "string", required: false}
              - {label: "Sottotitolo Cani", name: "dogsSubtitle", widget: "text", required: false}
              - {label: "Titolo Corsi", name: "coursesTitle", widget: "string", required: false}
              - {label: "Sottotitolo Corsi", name: "coursesSubtitle", widget: "text", required: false}
              - {label: "Titolo Eventi", name: "eventsTitle", widget: "string", required: false}
              - {label: "Sottotitolo Eventi", name: "eventsSubtitle", widget: "text", required: false}
              - {label: "Titolo Galleria", name: "galleryTitle", widget: "string", required: false}
              - {label: "Sottotitolo Galleria", name: "gallerySubtitle", widget: "text", required: false}
              - {label: "Titolo Partner", name: "partnersTitle", widget: "string", required: false}
              - {label: "Sottotitolo Partner", name: "partnersSubtitle", widget: "text", required: false}
              - {label: "Titolo FAQ", name: "faqTitle", widget: "string", required: false}
              - {label: "Sottotitolo FAQ", name: "faqSubtitle", widget: "text", required: false}
              - {label: "Titolo Contatti", name: "contactsTitle", widget: "string", required: false}
              - {label: "Sottotitolo Contatti", name: "contactsSubtitle", widget: "text", required: false}

          - label: "Giovanni Napoletano"
            name: "owner"
            widget: "object"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Ruoli", name: "roles", widget: "markdown", required: false}
              - {label: "Biografia", name: "bio", widget: "markdown", required: false}
              - {label: "Foto profilo", name: "photo", widget: "image", required: false}

          - label: "Contatti"
            name: "contacts"
            widget: "object"
            fields:
              - {label: "Referente", name: "name", widget: "string"}
              - {label: "Telefono", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "WhatsApp con prefisso internazionale", name: "whatsapp", widget: "string", required: false}

          - label: "Località operative"
            name: "locations"
            widget: "list"
            required: false
            field:
              label: "Località"
              name: "location"
              widget: "string"

          - label: "Social"
            name: "socials"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - {label: "Nome social", name: "label", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}

          - label: "Discipline"
            name: "disciplines"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attiva", name: "active", widget: "boolean", default: true}
              - {label: "Titolo", name: "title", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - label: "Categoria"
                name: "category"
                widget: "select"
                default: "Discipline olfattive"
                options:
                  - {label: "Discipline olfattive", value: "Discipline olfattive"}
                  - {label: "Unità cinofile specialistiche", value: "Unità cinofile specialistiche"}
                  - {label: "Educazione e comportamento", value: "Educazione e comportamento"}
                  - {label: "Formazione professionale", value: "Formazione professionale"}
                  - {label: "Altro", value: "Altro"}
              - {label: "Icona", name: "icon", widget: "string", required: false}
              - {label: "Immagine", name: "image", widget: "image", required: false}
              - label: "Adattamento immagine"
                name: "imageFit"
                widget: "select"
                default: "contain"
                options:
                  - {label: "Mostra tutta la foto", value: "contain"}
                  - {label: "Riempi il riquadro", value: "cover"}
              - label: "Posizione immagine"
                name: "imagePosition"
                widget: "select"
                default: "center"
                options:
                  - {label: "Centro", value: "center"}
                  - {label: "Alto", value: "top"}
                  - {label: "Basso", value: "bottom"}
                  - {label: "Sinistra", value: "left"}
                  - {label: "Destra", value: "right"}
              - {label: "Descrizione breve", name: "short", widget: "markdown", required: false}
              - {label: "Descrizione completa", name: "long", widget: "markdown", required: false}
              - {label: "Testo pulsante", name: "buttonText", widget: "string", required: false}
              - {label: "Link pulsante", name: "buttonLink", widget: "string", required: false}

          - label: "Cani"
            name: "dogs"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Foto", name: "photo", widget: "image", required: false}
              - label: "Adattamento foto"
                name: "imageFit"
                widget: "select"
                default: "contain"
                options:
                  - {label: "Mostra tutta la foto", value: "contain"}
                  - {label: "Riempi il riquadro", value: "cover"}
              - label: "Posizione foto"
                name: "imagePosition"
                widget: "select"
                default: "center"
                options:
                  - {label: "Centro", value: "center"}
                  - {label: "Alto", value: "top"}
                  - {label: "Basso", value: "bottom"}
                  - {label: "Sinistra", value: "left"}
                  - {label: "Destra", value: "right"}
              - {label: "Razza", name: "breed", widget: "string", required: false}
              - {label: "Sesso", name: "sex", widget: "string", required: false}
              - {label: "Data nascita", name: "birth", widget: "string", required: false}
              - {label: "Stato operativo", name: "status", widget: "markdown", required: false}
              - {label: "Disciplina", name: "discipline", widget: "markdown", required: false}
              - {label: "Livello operativo", name: "operationalLevel", widget: "markdown", required: false}
              - {label: "Certificazioni", name: "certifications", widget: "markdown", required: false}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}
              - label: "Galleria del cane"
                name: "gallery"
                widget: "list"
                required: false
                fields:
                  - {label: "Titolo", name: "title", widget: "string", required: false}
                  - {label: "Immagine", name: "image", widget: "image"}
              - {label: "Note operative", name: "notes", widget: "markdown", required: false}

          - label: "Corsi"
            name: "courses"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true}
              - {label: "Titolo corso", name: "title", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Locandina corso", name: "image", widget: "image", required: false}
              - {label: "Data / Periodo", name: "date", widget: "string", required: false}
              - {label: "Ora", name: "time", widget: "string", required: false}
              - {label: "Luogo", name: "location", widget: "markdown", required: false}
              - {label: "Durata", name: "duration", widget: "string", required: false}
              - {label: "Posti disponibili", name: "places", widget: "number", value_type: "int", default: 0, required: false}
              - {label: "Iscrizioni aperte", name: "registrationOpen", widget: "boolean", default: true}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}
              - {label: "Programma", name: "program", widget: "markdown", required: false}
              - {label: "Note iscrizione", name: "registrationNote", widget: "markdown", required: false}
              - {label: "Link iscrizione esterno", name: "link", widget: "string", required: false}

          - label: "Eventi"
            name: "events"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true}
              - {label: "Titolo evento", name: "title", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Locandina evento", name: "image", widget: "image", required: false}
              - {label: "Data evento", name: "date", widget: "string", required: false}
              - {label: "Ora", name: "time", widget: "string", required: false}
              - {label: "Luogo", name: "location", widget: "markdown", required: false}
              - {label: "Posti disponibili", name: "places", widget: "number", value_type: "int", default: 0, required: false}
              - {label: "Iscrizioni aperte", name: "registrationOpen", widget: "boolean", default: true}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}
              - {label: "Note iscrizione", name: "registrationNote", widget: "markdown", required: false}

          - label: "Galleria"
            name: "gallery"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - label: "Tipo"
                name: "type"
                widget: "select"
                default: "image"
                options:
                  - {label: "Immagine", value: "image"}
                  - {label: "Video", value: "video"}
              - {label: "Titolo", name: "title", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "File immagine o URL video", name: "url", widget: "string"}
              - {label: "Didascalia", name: "caption", widget: "markdown", required: false}
              - label: "Adattamento immagine"
                name: "imageFit"
                widget: "select"
                default: "contain"
                required: false
                options:
                  - {label: "Mostra tutta la foto", value: "contain"}
                  - {label: "Riempi il riquadro", value: "cover"}
              - label: "Posizione immagine"
                name: "imagePosition"
                widget: "select"
                default: "center"
                required: false
                options:
                  - {label: "Centro", value: "center"}
                  - {label: "Alto", value: "top"}
                  - {label: "Basso", value: "bottom"}
                  - {label: "Sinistra", value: "left"}
                  - {label: "Destra", value: "right"}

          - label: "Video"
            name: "videos"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string", required: false}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}

          - label: "Testimonianze"
            name: "reviews"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Foto", name: "photo", widget: "image", required: false}
              - {label: "Recensione", name: "review", widget: "markdown", required: false}

          - label: "Partner"
            name: "partners"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Logo", name: "logo", widget: "image", required: false}
              - {label: "Sito web", name: "website", widget: "string", required: false}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}

          - label: "Documenti"
            name: "documents"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "File", name: "file", widget: "file"}
              - {label: "Descrizione", name: "description", widget: "markdown", required: false}

          - label: "Numeri in evidenza"
            name: "stats"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - {label: "Numero", name: "number", widget: "string"}
              - {label: "Etichetta", name: "label", widget: "string"}

          - label: "FAQ"
            name: "faq"
            widget: "list"
            required: false
            summary: "{{fields.question}}"
            fields:
              - {label: "Domanda", name: "question", widget: "string"}
              - label: "Stile personalizzato"
                name: "style"
                widget: "object"
                required: false
                fields:
                  - {label: "Colore titolo", name: "titleColor", widget: "string", required: false}
                  - {label: "Colore testo", name: "textColor", widget: "string", required: false}
                  - {label: "Colore sfondo scheda", name: "cardColor", widget: "string", required: false}
                  - {label: "Font testo", name: "fontFamily", widget: "string", required: false}
                  - {label: "Font titolo", name: "titleFontFamily", widget: "string", required: false}
                  - {label: "Grandezza titolo", name: "titleSize", widget: "string", required: false}
                  - {label: "Grandezza testo", name: "textSize", widget: "string", required: false}
              - {label: "Risposta", name: "answer", widget: "markdown", required: false}

          - {label: "Footer", name: "footer", widget: "markdown", required: false}
