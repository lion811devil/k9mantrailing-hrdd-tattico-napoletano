backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
display_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
logo_url: "/logo.png"

collections:

- name: "settings"
  label: "Gestione sito"
  
  files:
  
  - label: "Contenuti principali"
    name: "site"
    file: "content/site.json"
    format: "json"
    
    fields:
    
    - label: "Homepage"
      name: "homepage"
      widget: "object"
      fields:
      
      - {label: "Titolo principale", name: "title", widget: "string"}
      - {label: "Sottotitolo", name: "subtitle", widget: "text"}
      - {label: "Immagine Hero", name: "hero_image", widget: "image", required: false}
    
    - label: "Marchio"
      name: "brand"
      widget: "object"
      fields:
      
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Logo", name: "logo", widget: "image"}
      - {label: "Slogan", name: "tagline", widget: "string"}
      - {label: "Descrizione", name: "description", widget: "text"}
    
    - label: "Giovanni Napoletano"
      name: "owner"
      widget: "object"
      fields:
      
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Ruoli", name: "roles", widget: "string"}
      - {label: "Biografia", name: "bio", widget: "text"}
      - {label: "Foto", name: "photo", widget: "image", required: false}
    
    - label: "Servizi"
      name: "services"
      widget: "list"
      fields:
      
      - {label: "Nome servizio", name: "title", widget: "string"}
      - {label: "Immagine", name: "image", widget: "image", required: false}
      - {label: "Descrizione", name: "description", widget: "text"}
    
    - label: "Cani"
      name: "dogs"
      widget: "list"
      fields:
      
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Foto", name: "image", widget: "image", required: false}
      - {label: "Razza", name: "breed", widget: "string", required: false}
      - {label: "Età", name: "age", widget: "string", required: false}
      - {label: "Stato operativo", name: "status", widget: "string"}
      - {label: "Certificazioni", name: "certifications", widget: "text", required: false}
      - {label: "Descrizione", name: "description", widget: "text"}
    
    - label: "Galleria"
      name: "gallery"
      widget: "list"
      fields:
      
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "Immagine", name: "image", widget: "image"}
      - {label: "Descrizione", name: "caption", widget: "text"}
    
    - label: "Video"
      name: "videos"
      widget: "list"
      fields:
      
      - {label: "Titolo", name: "title", widget: "string"}
      - {label: "URL", name: "url", widget: "string"}
      - {label: "Descrizione", name: "caption", widget: "text"}
    
    - label: "Testimonianze"
      name: "testimonials"
      widget: "list"
      required: false
      fields:
      
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Recensione", name: "review", widget: "text"}
    
    - label: "Partner"
      name: "partners"
      widget: "list"
      required: false
      fields:
      
      - {label: "Nome", name: "name", widget: "string"}
      - {label: "Logo", name: "logo", widget: "image"}
    
    - label: "Contatti"
      name: "contacts"
      widget: "object"
      fields:
      
      - {label: "Telefono", name: "phone", widget: "string"}
      - {label: "Email", name: "email", widget: "string"}
      - {label: "WhatsApp", name: "whatsapp", widget: "string"}
      - {label: "Zone operative", name: "location", widget: "text"}
    
    - label: "SEO"
      name: "seo"
      widget: "object"
      fields:
      
      - {label: "Titolo SEO", name: "title", widget: "string"}
      - {label: "Descrizione SEO", name: "description", widget: "text"}
      - {label: "Keywords", name: "keywords", widget: "text"}
