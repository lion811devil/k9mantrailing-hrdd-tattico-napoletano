backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
display_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
logo_url: "/logo.png"

collections:

- name: "settings"
  label: "Gestione sito"
  files:
    - label: "Contenuti principali"
      name: "site"
      file: "content/site.json"
      format: "json"
      fields:
        - {label: "Homepage", name: "homepage", widget: "object"}
        - {label: "Marchio", name: "brand", widget: "object"}
        - {label: "Proprietario", name: "owner", widget: "object"}
        - {label: "Contatti", name: "contacts", widget: "object"}
        - {label: "SEO", name: "seo", widget: "object"}

- name: "discipline"
  label: "Discipline"
  folder: "content/disciplines"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Titolo", name: "title", widget: "string"}
    - {label: "Immagine", name: "image", widget: "image", required: false}
    - {label: "Descrizione", name: "description", widget: "text"}

- name: "dogs"
  label: "Cani"
  folder: "content/dogs"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Nome", name: "name", widget: "string"}
    - {label: "Foto", name: "image", widget: "image"}
    - {label: "Razza", name: "breed", widget: "string", required: false}
    - {label: "Età", name: "age", widget: "string", required: false}
    - {label: "Stato operativo", name: "status", widget: "string"}
    - {label: "Descrizione", name: "description", widget: "text"}

- name: "courses"
  label: "Corsi"
  folder: "content/courses"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Titolo", name: "title", widget: "string"}
    - {label: "Immagine", name: "image", widget: "image", required: false}
    - {label: "Descrizione", name: "description", widget: "text"}

- name: "events"
  label: "Eventi"
  folder: "content/events"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Titolo", name: "title", widget: "string"}
    - {label: "Data", name: "date", widget: "datetime"}
    - {label: "Descrizione", name: "description", widget: "text"}

- name: "gallery"
  label: "Galleria"
  folder: "content/gallery"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Titolo", name: "title", widget: "string"}
    - {label: "Immagine", name: "image", widget: "image"}
    - {label: "Descrizione", name: "caption", widget: "text", required: false}

- name: "videos"
  label: "Video"
  folder: "content/videos"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Titolo", name: "title", widget: "string"}
    - {label: "URL", name: "url", widget: "string"}

- name: "faq"
  label: "FAQ"
  folder: "content/faq"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Domanda", name: "question", widget: "string"}
    - {label: "Risposta", name: "answer", widget: "text"}

- name: "partners"
  label: "Partner"
  folder: "content/partners"
  create: true
  slug: "{{slug}}"
  extension: "json"
  format: "json"
  fields:
    - {label: "Nome", name: "name", widget: "string"}
    - {label: "Logo", name: "logo", widget: "image"}
    
