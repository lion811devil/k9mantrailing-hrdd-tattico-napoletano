backend:
  name: git-gateway
  branch: main
local_backend: false
media_folder: assets/uploads
public_folder: /assets/uploads
site_url: https://k9mantrailing-hrdd-tattico-napoletano.netlify.app
display_url: https://k9mantrailing-hrdd-tattico-napoletano.netlify.app
logo_url: /logo.png
collections:
- name: home_theme
  label: 01 Pagina iniziale, copertina e aspetto
  files:
  - label: 01 Pagina iniziale, copertina e aspetto
    name: home_theme
    file: content/home.json
    format: json
    fields:
    - label: Nome del sito
      name: siteName
      widget: string
    - label: Logo principale
      name: logo
      widget: image
      required: false
    - label: Logo secondario
      name: logoSecondary
      widget: image
      required: false
    - label: Frase breve sopra il titolo principale
      name: tagline
      widget: string
      required: false
    - label: Titolo principale della copertina
      name: heroTitle
      widget: string
      hint: Modifica il grande titolo visibile nella prima schermata del sito.
    - label: Testo descrittivo della copertina
      name: heroSubtitle
      widget: markdown
      required: false
      hint: Modifica il testo mostrato sotto il titolo principale.
    - label: Immagine di sfondo della copertina
      name: heroImage
      widget: image
      required: false
      hint: Carica lo sfondo della prima schermata del sito.
    - label: Gestione avanzata della copertina iniziale
      name: heroManager
      widget: object
      required: false
      fields:
      - label: Attivo
        name: active
        widget: boolean
        default: true
        required: false
      - label: Titolo principale
        name: title
        widget: string
        required: false
      - label: Sottotitolo
        name: subtitle
        widget: markdown
        required: false
      - label: Frase breve sopra il titolo principale
        name: tagline
        widget: string
        required: false
      - label: Immagine di sfondo
        name: backgroundImage
        widget: image
        required: false
      - label: Immagine in primo piano
        name: subjectImage
        widget: image
        required: false
      - label: Posizione dell’immagine in primo piano
        name: subjectPosition
        widget: select
        required: false
        options:
        - label: Destra
          value: right
        - label: Sinistra
          value: left
        - label: Centro
          value: center
      - label: Dimensione dell’immagine in primo piano
        name: subjectWidth
        widget: string
        required: false
      - label: Trasparenza dell’immagine in primo piano
        name: subjectOpacity
        widget: string
        required: false
      - label: Oscuramento dello sfondo
        name: overlayOpacity
        widget: string
        required: false
      - label: Secondi tra un’immagine e la successiva
        name: slideSeconds
        widget: number
        value_type: int
        default: 6
        required: false
      - label: Copertine aggiuntive
        name: slides
        widget: list
        required: false
        summary: '{{fields.title}}'
        fields:
        - label: Attiva
          name: active
          widget: boolean
          default: true
          required: false
        - label: Titolo
          name: title
          widget: string
          required: false
        - label: Sottotitolo
          name: subtitle
          widget: markdown
          required: false
        - label: Frase breve sopra il titolo principale
          name: tagline
          widget: string
          required: false
        - label: Immagine di sfondo
          name: backgroundImage
          widget: image
          required: false
        - label: Immagine in primo piano
          name: subjectImage
          widget: image
          required: false
        - label: Posizione dell’immagine in primo piano
          name: subjectPosition
          widget: select
          required: false
          options:
          - label: Destra
            value: right
          - label: Sinistra
            value: left
          - label: Centro
            value: center
        - label: Dimensione dell’immagine in primo piano
          name: subjectWidth
          widget: string
          required: false
        - label: Trasparenza dell’immagine in primo piano
          name: subjectOpacity
          widget: string
          required: false
        - label: Durata in secondi
          name: duration
          widget: number
          value_type: int
          default: 6
          required: false
    - label: Immagini in sequenza della copertina
      name: heroImages
      widget: list
      required: false
      summary: '{{fields.title}}'
      fields:
      - label: Titolo interno
        name: title
        widget: string
        required: false
      - label: Immagine
        name: image
        widget: image
        required: false
    - label: Tema attualmente utilizzato
      name: activeTheme
      widget: string
      required: false
      hint: Scrivi esattamente il nome del tema da applicare. Puoi usare anche un nuovo tema aggiunto nell’elenco sottostante.
    - label: Temi personalizzati e tavolozze colori
      name: themes
      widget: list
      required: false
      summary: '{{fields.name}}'
      hint: Aggiungi tutti i temi che desideri. Per usarne uno, seleziona lo stesso nome nel campo “Tema attualmente utilizzato”.
      fields:
      - label: Nome del tema
        name: name
        widget: string
      - label: Tema disponibile
        name: active
        widget: boolean
        default: true
        required: false
      - label: Colore principale
        name: primaryColor
        widget: colorpicker
        required: false
        hint: Usato per pulsanti, evidenze e collegamenti.
      - label: Colore secondario
        name: secondaryColor
        widget: colorpicker
        required: false
      - label: Sfondo generale del sito
        name: siteBackground
        widget: colorpicker
        required: false
      - label: Sfondo delle schede
        name: cardBackground
        widget: colorpicker
        required: false
      - label: Colore della barra superiore
        name: headerBackground
        widget: colorpicker
        required: false
      - label: Colore della parte finale
        name: footerBackground
        widget: colorpicker
        required: false
      - label: Colore del testo principale
        name: textColor
        widget: colorpicker
        required: false
      - label: Colore dei testi secondari
        name: mutedTextColor
        widget: colorpicker
        required: false
      - label: Colore o sfumatura dei pulsanti
        name: buttonBackground
        widget: string
        required: false
        hint: 'Puoi usare un colore, per esempio #D4AF37, oppure una sfumatura.'
      - label: Colore del testo dei pulsanti
        name: buttonTextColor
        widget: colorpicker
        required: false
      - label: Colore dei bordi
        name: borderColor
        widget: colorpicker
        required: false
      - label: Carattere dei titoli
        name: titleFont
        widget: string
        required: false
      - label: Carattere dei testi
        name: bodyFont
        widget: string
        required: false
      - label: Carattere dei pulsanti
        name: buttonFont
        widget: string
        required: false
      - label: Arrotondamento delle schede
        name: cardRadius
        widget: string
        required: false
        hint: 'Esempio: 30px'
      - label: Arrotondamento dei pulsanti
        name: buttonRadius
        widget: string
        required: false
        hint: 'Esempio: 18px'
      - label: Mostra ombra sulle schede
        name: cardShadow
        widget: boolean
        default: true
        required: false
    - label: Avviso orizzontale in alto
      name: banner
      widget: object
      required: false
      fields:
      - label: Attivo
        name: active
        widget: boolean
        default: false
        required: false
      - label: Testo banner
