backend:
  name: git-gateway
  branch: main

local_backend: false

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
display_url: "https://k9mantrailing-hrdd-tattico-napoletano.netlify.app"
logo_url: "/logo.png"

collections:
  - name: "settings"
    label: "Gestione sito"
    files:
      - label: "Contenuti principali"
        name: "site"
        file: "content/site.json"
        format: "json"
        fields:

          - label: "Homepage"
            name: "homepage"
            widget: "object"
            fields:
              - {label: "Titolo principale", name: "title", widget: "string"}
              - {label: "Sottotitolo", name: "subtitle", widget: "text"}
              - {label: "Immagine Hero", name: "hero_image", widget: "image", required: false}

          - label: "Marchio"
            name: "brand"
            widget: "object"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Logo", name: "logo", widget: "image"}
              - {label: "Slogan", name: "tagline", widget: "string"}
              - {label: "Descrizione", name: "description", widget: "text"}

          - label: "Giovanni Napoletano"
            name: "owner"
            widget: "object"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Ruoli", name: "roles", widget: "string"}
              - {label: "Biografia", name: "bio", widget: "text"}
              - {label: "Foto", name: "photo", widget: "image", required: false}

          - label: "Servizi / Discipline"
            name: "services"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Ordine", name: "order", widget: "number", required: false, value_type: "int"}
              - {label: "Nome servizio / disciplina", name: "title", widget: "string"}
              - {label: "Immagine", name: "image", widget: "image", required: false}
              - {label: "Descrizione breve", name: "description", widget: "text"}
              - {label: "Descrizione completa", name: "long_description", widget: "text", required: false}
              - {label: "Specializzazione", name: "specialization", widget: "string", required: false}

          - label: "Cani"
            name: "dogs"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Ordine", name: "order", widget: "number", required: false, value_type: "int"}
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Foto", name: "image", widget: "image", required: false}
              - {label: "Razza", name: "breed", widget: "string", required: false}
              - {label: "Età", name: "age", widget: "string", required: false}
              - {label: "Stato operativo", name: "status", widget: "string"}
              - {label: "Specializzazione", name: "specialization", widget: "string", required: false}
              - {label: "Certificazioni", name: "certifications", widget: "text", required: false}
              - {label: "Descrizione", name: "description", widget: "text"}

          - label: "Galleria"
            name: "gallery"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - {label: "Attiva", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "Immagine", name: "image", widget: "image"}
              - {label: "Descrizione", name: "caption", widget: "text", required: false}

          - label: "Video"
            name: "videos"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Titolo", name: "title", widget: "string"}
              - {label: "URL video", name: "url", widget: "string", required: false}
              - {label: "Descrizione", name: "caption", widget: "text", required: false}

          - label: "Corsi"
            name: "courses"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Ordine", name: "order", widget: "number", required: false, value_type: "int"}
              - {label: "Titolo corso", name: "title", widget: "string"}
              - {label: "Locandina / Immagine", name: "image", widget: "image", required: false}
              - {label: "Data", name: "date", widget: "string", required: false}
              - {label: "Luogo", name: "location", widget: "string", required: false}
              - {label: "Durata", name: "duration", widget: "string", required: false}
              - {label: "Descrizione", name: "description", widget: "text"}
              - {label: "Programma", name: "program", widget: "text", required: false}
              - {label: "Link iscrizione", name: "signup_url", widget: "string", required: false}

          - label: "Eventi"
            name: "events"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Data", name: "date", widget: "string", required: false}
              - {label: "Titolo evento", name: "title", widget: "string"}
              - {label: "Luogo", name: "location", widget: "string", required: false}
              - {label: "Immagine", name: "image", widget: "image", required: false}
              - {label: "Descrizione", name: "description", widget: "text"}

          - label: "Documenti scaricabili"
            name: "downloads"
            widget: "list"
            required: false
            summary: "{{fields.title}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Titolo documento", name: "title", widget: "string"}
              - {label: "File", name: "file", widget: "file"}
              - {label: "Descrizione", name: "description", widget: "text", required: false}

          - label: "FAQ"
            name: "faq"
            widget: "list"
            required: false
            summary: "{{fields.question}}"
            fields:
              - {label: "Attiva", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Domanda", name: "question", widget: "string"}
              - {label: "Risposta", name: "answer", widget: "text"}

          - label: "Testimonianze"
            name: "testimonials"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            fields:
              - {label: "Attiva", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Recensione", name: "review", widget: "text"}

          - label: "Partner"
            name: "partners"
            widget: "list"
            required: false
            summary: "{{fields.name}}"
            fields:
              - {label: "Attivo", name: "active", widget: "boolean", default: true, required: false}
              - {label: "Nome", name: "name", widget: "string"}
              - {label: "Logo", name: "logo", widget: "image", required: false}
              - {label: "Link", name: "url", widget: "string", required: false}

          - label: "Social"
            name: "social"
            widget: "object"
            required: false
            fields:
              - {label: "Facebook", name: "facebook", widget: "string", required: false}
              - {label: "Instagram", name: "instagram", widget: "string", required: false}
              - {label: "TikTok", name: "tiktok", widget: "string", required: false}
              - {label: "YouTube", name: "youtube", widget: "string", required: false}
              - {label: "Telegram", name: "telegram", widget: "string", required: false}
              - {label: "LinkedIn", name: "linkedin", widget: "string", required: false}

          - label: "Contatti"
            name: "contacts"
            widget: "object"
            fields:
              - {label: "Telefono", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "WhatsApp con prefisso internazionale", name: "whatsapp", widget: "string"}
              - {label: "Zone operative", name: "location", widget: "text"}

          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Titolo SEO", name: "title", widget: "string"}
              - {label: "Descrizione SEO", name: "description", widget: "text"}
              - {label: "Keywords", name: "keywords", widget: "text"}
              
